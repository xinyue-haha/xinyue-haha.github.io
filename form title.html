<!DOCTYPE html>
<html lang="en">
    <head>
    <charset="UTF-8">
	<title>表单学习</title>
	</head>
	<body>
	<h1>表单的三要素</h1>
	<p>表单域</p>
	<p>表单控件（表单元素）</p>
	<p>提示信息</p>
	<!--提示信息就是表单元素前面的提示字-->
	<h1>调查问卷</h1>
	<form>
	姓名：<input type="text" maxlength="6" name="name" value="请输入名字"><br>
	性别： 男<input type="radio" name="sex"> 女<input type="radio" name="sex"><br>
	爱好：  唱歌<input type="checkbox" name="hobby"> 跳舞<input type="checkbox" name="hobby"> 画画<input type="checkbox" name="hobby"> 跑步<input type="checkbox" name="hobby"><br>
	密码：<input type="password" name="pwd"><br>
	贺心悦是美女：  是<input type="radio" checked="checked">  否<input type="radio">
	</form>
	</body>
</html>
